apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: webapp
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: ''
    namespace: default
    server: 'https://kubernetes.default.svc'
  source:
    path: ci-cd-demo
    repoURL: 'https://github.com/sysinstructor/cicd-demo-config'
    targetRevision: master
  project: cicd-project
  syncPolicy:
    automated: null
    syncOptions:
      - CreateNamespace=true
